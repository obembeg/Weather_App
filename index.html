<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Welcome to <span class="welcome"> Get.Weather</span></h1>
    <div class="search-bar">
        <input id="search" class="search" type="text" placeholder="Enter name of location to get waether report">
        <button id="searchBtn" class="button">Search</button>
    </div>


      <div class="report">
        <p id="location" class="location"></p>
        <p id="date" class="date"></p>
      </div>

      <img id="icon" class="icon" src="" alt="" >

      <div id="temp" class="temp"></div>
      <div id="status" class="status"></div>
      <div class="details">
        <div id="feels" class="status"></div>
        <div id="wind" class="feels"></div>
        <div id="humidity" class="status"></div>
      </div>


</body>
<!-- <footer class="footer">OG</footer> -->

<script src="script.js"></script>
</html>
